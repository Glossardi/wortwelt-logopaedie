<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9F9F9"/>
      <stop offset="100%" stop-color="#F0F7F7"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C9EA0"/>
      <stop offset="100%" stop-color="#4A8385"/>
    </linearGradient>
    <linearGradient id="bubbleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DB8BA"/>
      <stop offset="100%" stop-color="#5C9EA0"/>
    </linearGradient>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6F61"/>
      <stop offset="100%" stop-color="#E85D50"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="450" rx="16" fill="url(#abg)"/>
  <!-- Soft background circle -->
  <circle cx="300" cy="225" r="170" fill="#5C9EA0" opacity="0.06"/>
  <circle cx="300" cy="225" r="130" fill="#5C9EA0" opacity="0.05"/>
  <!-- Abstract figure left — therapist -->
  <circle cx="210" cy="160" r="28" fill="url(#bubbleGrad)"/>
  <ellipse cx="210" cy="230" rx="24" ry="35" fill="url(#bubbleGrad)" rx="24"/>
  <!-- Abstract figure right — client -->
  <circle cx="390" cy="170" r="24" fill="url(#bubbleGrad2)"/>
  <ellipse cx="390" cy="232" rx="20" ry="30" fill="url(#bubbleGrad2)"/>
  <!-- Connection arc between figures -->
  <path d="M238 190 Q300 130, 362 195" fill="none" stroke="#5C9EA0" stroke-width="2" stroke-opacity="0.25" stroke-dasharray="6 4"/>
  <!-- Speech bubble from therapist -->
  <path d="M250 120 C250 108, 258 102, 268 102 L318 102 C328 102, 336 108, 336 120 L336 142 C336 152, 328 158, 318 158 L278 158 L262 172 L266 158 L268 158 C258 158, 250 152, 250 142 Z" fill="#FFFFFF" stroke="#5C9EA0" stroke-width="1.5"/>
  <!-- Sound waves inside therapist bubble -->
  <path d="M280 124 Q286 118, 280 112" fill="none" stroke="#5C9EA0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M288 127 Q297 118, 288 109" fill="none" stroke="#5C9EA0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M296 130 Q308 118, 296 106" fill="none" stroke="#FF6F61" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small response bubble from client -->
  <path d="M400 130 C400 122, 406 118, 413 118 L443 118 C450 118, 456 122, 456 130 L456 144 C456 152, 450 156, 443 156 L420 156 L410 164 L413 156 L413 156 C406 156, 400 152, 400 144 Z" fill="#FF6F61" opacity="0.15" stroke="#FF6F61" stroke-width="1"/>
  <circle cx="420" cy="137" r="2.5" fill="#FF6F61" opacity="0.6"/>
  <circle cx="428" cy="137" r="2.5" fill="#FF6F61" opacity="0.6"/>
  <circle cx="436" cy="137" r="2.5" fill="#FF6F61" opacity="0.6"/>
  <!-- Decorative scattered speech bubbles — small, subtle -->
  <g opacity="0.12">
    <path d="M80 320 C80 314, 84 310, 90 310 L115 310 C121 310, 125 314, 125 320 L125 334 C125 340, 121 344, 115 344 L98 344 L90 351 L92 344 L90 344 C84 344, 80 340, 80 334 Z" fill="#5C9EA0"/>
    <path d="M470 310 C470 305, 474 302, 479 302 L502 302 C507 302, 511 305, 511 310 L511 322 C511 327, 507 330, 502 330 L488 330 L481 336 L483 330 L479 330 C474 330, 470 327, 470 322 Z" fill="#7DB8BA"/>
  </g>
  <!-- Floating dots — communication particles -->
  <circle cx="150" cy="280" r="4" fill="#FF6F61" opacity="0.2"/>
  <circle cx="450" cy="270" r="5" fill="#5C9EA0" opacity="0.15"/>
  <circle cx="170" cy="120" r="3" fill="#5C9EA0" opacity="0.15"/>
  <circle cx="490" cy="180" r="3.5" fill="#FF6F61" opacity="0.18"/>
  <circle cx="300" cy="80" r="3" fill="#5C9EA0" opacity="0.12"/>
  <circle cx="110" cy="200" r="2.5" fill="#7DB8BA" opacity="0.18"/>
  <circle cx="520" cy="140" r="2" fill="#5C9EA0" opacity="0.15"/>
  <!-- Bottom decorative wave -->
  <path d="M0 390 Q150 365, 300 385 T600 370 L600 450 L0 450 Z" fill="#5C9EA0" opacity="0.06"/>
  <path d="M0 410 Q150 390, 300 405 T600 395 L600 450 L0 450 Z" fill="#5C9EA0" opacity="0.04"/>
  <!-- Warm connecting dots pattern — center -->
  <circle cx="270" cy="200" r="2" fill="#5C9EA0" opacity="0.2"/>
  <circle cx="290" cy="190" r="1.5" fill="#5C9EA0" opacity="0.15"/>
  <circle cx="310" cy="195" r="2" fill="#FF6F61" opacity="0.2"/>
  <circle cx="330" cy="205" r="1.5" fill="#5C9EA0" opacity="0.15"/>
</svg>
