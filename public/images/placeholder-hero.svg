<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#78716c"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#grain)" opacity="0.1"/>
  <defs>
    <pattern id="grain" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="1" fill="#fff" opacity="0.3"/>
      <circle cx="75" cy="50" r="1" fill="#fff" opacity="0.2"/>
      <circle cx="50" cy="75" r="1.5" fill="#fff" opacity="0.15"/>
    </pattern>
  </defs>
  <text x="800" y="440" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#d6d3d1" opacity="0.6">Hero-Bild (1600 × 900)</text>
  <text x="800" y="480" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#d6d3d1" opacity="0.4">Ersetze mit einem Kundenfoto</text>
</svg>
